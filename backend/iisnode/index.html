<html>
<head>
    <title>iisnode logs</title>
    <style type="text/css">
        body
        {
            font-family: "Trebuchet MS" , Arial, Helvetica, sans-serif;
        }
        table
        {
            border-collapse: collapse;
        }
        td, th
        {
            border: 1px solid lightgray;
            padding: 3px 7px 2px 7px;
        }
        th
        {
            text-align: left;
            padding-top: 5px;
            padding-bottom: 4px;
            background-color: Gray;
            color: #ffffff;
        }
        td.stderr
        {
            color: Red;
        }
    </style>
</head>
<body>
    <table id="logFilesTable">
        <tr>
            <th>
                Computer name
            </th>
            <th>
                PID
            </th>
            <th>
                Type
            </th>
            <th>
                Created
            </th>
            <th>
                Link
            </th>
        </tr>
    </table>
    <p id="lastUpdated"></p>
    <script type="text/javascript">

        // this is replaced with actual data at runtime by code in interceptor.js
        var logFiles = [{"file":"DESKTOP-8V6G5RQ-15720-stderr-1777364779180.txt","computername":"DESKTOP-8V6G5RQ","pid":15720,"type":"stderr","created":1777364779180},{"file":"DESKTOP-8V6G5RQ-15720-stdout-1777364779179.txt","computername":"DESKTOP-8V6G5RQ","pid":15720,"type":"stdout","created":1777364779179},{"file":"DESKTOP-8V6G5RQ-21416-stderr-1777361260430.txt","computername":"DESKTOP-8V6G5RQ","pid":21416,"type":"stderr","created":1777361260430},{"file":"DESKTOP-8V6G5RQ-21416-stdout-1777361260430.txt","computername":"DESKTOP-8V6G5RQ","pid":21416,"type":"stdout","created":1777361260430},{"file":"DESKTOP-8V6G5RQ-31252-stderr-1777231457209.txt","computername":"DESKTOP-8V6G5RQ","pid":31252,"type":"stderr","created":1777231457209},{"file":"DESKTOP-8V6G5RQ-31252-stdout-1777231457208.txt","computername":"DESKTOP-8V6G5RQ","pid":31252,"type":"stdout","created":1777231457208}];
        var lastUpdated = 1777364779900;
        var date = new Date();

        date.setTime(lastUpdated);
        document.getElementById('lastUpdated').innerHTML = 'Index was last updated ' + date;

        logFiles.sort(function (a, b) {
            return b.created - a.created;
        });

        var logFilesTable = document.getElementById("logFilesTable");
        for (var i = 0; i < logFiles.length; i++) {
            var logFile = logFiles[i];
            date.setTime(logFile.created);
            var row = logFilesTable.insertRow(-1);
            var computerNameCell = row.insertCell(0);
            var pidCell = row.insertCell(1);
            var typeCell = row.insertCell(2);
            var dateCell = row.insertCell(3);
            var logCell = row.insertCell(4);
            computerNameCell.innerHTML = logFile.computername;
            pidCell.innerHTML = logFile.pid.toString();
            typeCell.innerHTML = logFile.type;
            typeCell.setAttribute('class', logFile.type);
            dateCell.innerHTML = date.toString();
            logCell.innerHTML = '<a href="' + logFile.file + '">log</a>';
        };

    </script>
</body>
</html>
